format = """
[╭─](bold cyan) $os$directory$git_branch$git_status$python$lua$nodejs$golang$haskell$rust$ruby$docker_context$aws$cmd_duration$jobs$status$fill$time
[╰─](bold cyan) $character"""

add_newline = true

[os]
disabled = false
style = "bold fg:bright-white"
format = '[$symbol ]($style)'

[os.symbols]
Macos = ""
Linux = ""
Windows = "󰍲"

[directory]
style = 'bold fg:bright-cyan'
format = '[ ](bold fg:bright-green)[$path]($style) '
truncation_length = 3
truncation_symbol = '…/'
truncate_to_repo = false

[directory.substitutions]
'Documents' = '󰈙'
'Downloads' = ' '
'Music' = ' '
'Pictures' = ' '

[git_branch]
style = 'bold fg:bright-green'
symbol = ' '
format = '[$symbol$branch]($style) '

[git_status]
style = 'bold fg:bright-red'
format = '[$all_status$ahead_behind]($style) '

[fill]
symbol = '· '
style = 'dimmed cyan'

[python]
style = 'bold fg:bright-yellow'
symbol = ' '
format = '[$symbol${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
pyenv_version_name = true
pyenv_prefix = ''

[lua]
style = 'bold fg:bright-blue'
format = '[$symbol($version) ]($style)'
symbol = ' '

[nodejs]
disabled = true
style = 'fg:bright-green'
symbol = ' '
format = '[$symbol($version) ]($style)'

[golang]
style = 'fg:bright-cyan'
symbol = ' '
format = '[$symbol($version) ]($style)'

[haskell]
style = 'fg:bright-purple'
symbol = ' '
format = '[$symbol($version) ]($style)'

[rust]
style = 'fg:bright-red'
symbol = ' '
format = '[$symbol($version) ]($style)'

[ruby]
style = 'fg:bright-red'
symbol = ' '
format = '[$symbol($version) ]($style)'

[package]
symbol = '󰏗 '
style = 'fg:208'
format = '[$symbol($version) ]($style)'

[aws]
symbol = ' '
style = 'fg:208'
format = '[$symbol($profile )(\[$duration\] )]($style)'

[docker_context]
symbol = ' '
style = 'fg:bright-blue'
format = '[$symbol$context ]($style)'
detect_files = ['docker-compose.yml', 'docker-compose.yaml', 'Dockerfile']
detect_extensions = ['Dockerfile']

[jobs]
symbol = ' '
style = 'fg:bright-blue'
number_threshold = 1
format = '[$symbol$number ]($style)'

[cmd_duration]
min_time = 500
style = 'bold fg:bright-yellow'
format = '[󱎫 $duration ]($style)'

[character]
success_symbol = '[❯](bold fg:bright-green)'
error_symbol = '[❯](bold fg:bright-red)'

[time]
disabled = false
style = 'bold fg:bright-cyan'
format = '[ 󰥔  $time ]($style)'
time_format = '%I:%M:%S %p'

[username]
show_always = false
style_user = 'fg:bright-cyan'
style_root = 'fg:bright-red'
format = '[$user]($style)'

[hostname]
ssh_only = true
style = 'fg:bright-cyan'
format = '[@$hostname ]($style)'

[status]
disabled = false
style = 'fg:bright-red'
format = '[$symbol$status ]($style)'
symbol = ' '
