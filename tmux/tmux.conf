set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

unbind %
bind | split-window -h

unbind '"'
bind - split-window -v

unbind r
bind r source-file ~/.tmux.conf

bind j resize-pane -D 5
bind k resize-pane -U 5
bind l resize-pane -R 5
bind h resize-pane -L 5

bind -r m resize-pane -Z

bind M-c attach-session -c "#{pane_current_path}"

set -g mouse on

# Each WezTerm tab starts its own tmux session. When the tab/window is closed,
# destroy that now-unattached session so foreground apps like Newsboat exit.
set -g destroy-unattached on

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "pbcopy" # copy to macOS clipboard with "y"

# mouse drag-release: copy selection straight to the macOS clipboard, then exit copy mode
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# remove delay for exiting insert mode with ESC in Neovim
set -sg escape-time 10

# ==========================================================================
# Cyberpunk-neon status bar  (hand-rolled, matches the WezTerm palette)
#   palette: bg0 #07070d  bg1 #15151f  magenta #d62cff  cyan #02d7f2
#            yellow #fcee0a  green #00ff9c  fg #c0c4dd  dark #0a0a12
#   Powerline glyphs require a Nerd Font (VictorMono Nerd Font is set
#   as the WezTerm font, so they render).
# ==========================================================================
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#07070d,fg=#c0c4dd"

# --- left: session / mode / privacy-safe context -------------------------
set -g status-left-length 110
set -g status-left "#[fg=#0a0a12,bg=#d62cff,bold]  TMUX #[fg=#d62cff,bg=#15151f]#[fg=#c0c4dd,bg=#15151f] #{?client_prefix,Mode: Prefix,#{?pane_in_mode,Mode: Copy,#{?window_zoomed_flag,Mode: Zoom,Mode: Normal}}} #[fg=#15151f,bg=#07070d] #[fg=#6ce8ff,bg=#07070d]#($HOME/.tmux/status/context.sh '#{pane_current_path}') "

# --- windows -------------------------------------------------------------
set -g window-status-separator ""
set -g window-status-format "#[fg=#6ce8ff,bg=#07070d] #I #[fg=#7a7a92]#W "
set -g window-status-current-format "#[fg=#07070d,bg=#02d7f2]#[fg=#0a0a12,bg=#02d7f2,bold] #I #[fg=#0a0a12,bg=#02d7f2]#W #[fg=#02d7f2,bg=#07070d]"
set -g window-status-activity-style "fg=#fcee0a,bg=#07070d"

# --- right: system + date + 12-hour time ---------------------------------
set -g status-right-length 140
set -g status-right "#[fg=#00ff9c,bg=#07070d]#[fg=#0a0a12,bg=#00ff9c,bold] #($HOME/.tmux/status/disk.sh) #[fg=#15151f,bg=#00ff9c]#[fg=#c0c4dd,bg=#15151f] #($HOME/.tmux/status/load.sh) #[fg=#fcee0a,bg=#15151f]#[fg=#0a0a12,bg=#fcee0a,bold] Windows: #{session_windows}  Panes: #{window_panes} #[fg=#d62cff,bg=#fcee0a]#[fg=#0a0a12,bg=#d62cff,bold] %a %d %b #[fg=#02d7f2,bg=#d62cff]#[fg=#0a0a12,bg=#02d7f2,bold] %I:%M %p "

# --- pane borders / messages / modes -------------------------------------
set -g pane-border-style "fg=#15151f"
set -g pane-active-border-style "fg=#d62cff"
set -g message-style "bg=#d62cff,fg=#0a0a12"
set -g message-command-style "bg=#fcee0a,fg=#0a0a12"
set -g mode-style "bg=#3a1158,fg=#f5e6ff"
set -g clock-mode-colour "#02d7f2"

# Dim inactive panes, brighten the focused one (mirrors WezTerm).
# bg=default lets the WezTerm background image show through.
set -g window-style "fg=#8a8a9a,bg=default"
set -g window-active-style "fg=#e8f6ff,bg=default"

# ==========================================================================
# Plugins
# ==========================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes
set -g @treemux-tree-client 'nvim-tree'  # or 'neo-tree'
set -g @treemux-tree-nvim-init-file '~/.tmux/plugins/treemux/configs/treemux_init.lua'
set -g @plugin 'kiyoon/treemux'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'off'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
